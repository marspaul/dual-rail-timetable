<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>雙鐵時刻表</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="雙鐵">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg:        #0E1A2B;
    --c-surface:   #142339;
    --c-surface-2: #1B2D48;
    --c-surface-3: #223454;
    --c-line:      #233a5e;
    --c-text:      #EAF1FB;
    --c-text-dim:  #8AA0BD;
    --c-accent:    #FF8C42;
    --c-accent-2:  #FFB661;
    --c-tra:       #1F6FB2;
    --c-thsr:      #E8A020;
    --c-success:   #4ADE80;
    --c-danger:    #F87171;
    --shadow-1: 0 4px 16px rgba(0,0,0,0.25);
    --shadow-2: 0 12px 40px rgba(0,0,0,0.4);
    --radius-m: 16px;
    --radius-l: 22px;
    --font: 'Noto Sans TC', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,140,66,0.07), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(31,111,178,0.16), transparent 60%),
      var(--c-bg);
    color: var(--c-text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }
  .app {
    width: 100%; max-width: 480px; min-height: 100vh;
    background: linear-gradient(180deg, rgba(20,35,57,0.55) 0%, rgba(14,26,43,0.97) 100%);
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-2);
  }

  /* === Header === */
  header { padding: 28px 22px 16px; display: flex; align-items: flex-end; justify-content: space-between; }
  .brand .title { font-size: 26px; font-weight: 900; letter-spacing: 1px; background: linear-gradient(135deg, #fff 0%, var(--c-accent-2) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .brand .subtitle { font-size: 11px; letter-spacing: 4px; color: var(--c-text-dim); text-transform: uppercase; font-family: var(--mono); }
  .clock { font-family: var(--mono); font-size: 14px; color: var(--c-accent-2); background: rgba(255,140,66,0.08); padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(255,140,66,0.2); }

  /* === Tabs === */
  .tabs { margin: 8px 22px 0; background: var(--c-surface); border-radius: var(--radius-l); padding: 5px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; border: 1px solid var(--c-line); }
  .tab { padding: 12px 8px; text-align: center; border-radius: 18px; font-size: 14px; font-weight: 700; color: var(--c-text-dim); cursor: pointer; transition: all .25s ease; user-select: none; }
  .tab.active[data-tab="tra"]      { background: var(--c-tra); color: #fff; box-shadow: var(--shadow-1); }
  .tab.active[data-tab="thsr"]     { background: var(--c-thsr); color: #1a1000; box-shadow: var(--shadow-1); }
  .tab.active[data-tab="transfer"] { background: linear-gradient(135deg, var(--c-tra), var(--c-thsr)); color: #fff; box-shadow: var(--shadow-1); }

  /* === Search Card === */
  .search-card { margin: 18px 22px 0; background: var(--c-surface); border-radius: var(--radius-l); padding: 18px; border: 1px solid var(--c-line); box-shadow: var(--shadow-1); }
  .station-row { display: grid; grid-template-columns: 1fr 44px 1fr; gap: 8px; align-items: flex-end; }
  .station-label { font-size: 10px; color: var(--c-text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; font-family: var(--mono); }

  .station-btn {
    width: 100%; background: var(--c-surface-2); border: 1px solid var(--c-line); border-radius: var(--radius-m);
    padding: 10px 14px; color: var(--c-text); text-align: left; cursor: pointer;
    transition: border-color .2s, background .2s; min-height: 62px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .station-btn:focus { border-color: var(--c-accent); background: rgba(255,140,66,0.04); outline: none; }
  .station-btn .county { font-size: 10px; color: var(--c-text-dim); font-family: var(--mono); margin-bottom: 3px; letter-spacing: 1px; min-height: 14px; }
  .station-btn .name   { font-size: 16px; font-weight: 700; }
  .station-btn.empty .county { color: transparent; }
  .station-btn.empty .name   { font-size: 14px; font-weight: 400; color: var(--c-text-dim); }

  .swap-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--c-accent); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: transform .4s cubic-bezier(.4,1.6,.5,1), background .2s; box-shadow: 0 4px 12px rgba(255,140,66,0.3); flex-shrink: 0; }
  .swap-btn:hover { background: var(--c-accent-2); }
  .swap-btn.spin { transform: rotate(180deg); }

  .dt-cell { background: var(--c-surface-2); padding: 10px 14px; border-radius: var(--radius-m); border: 1px solid var(--c-line); }
  .dt-cell label { display: block; font-size: 10px; color: var(--c-text-dim); letter-spacing: 2px; font-family: var(--mono); margin-bottom: 4px; }
  .dt-cell input { background: transparent; border: none; color: var(--c-text); font-size: 15px; width: 100%; outline: none; font-family: var(--mono); }
  .dt-cell input::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

  .search-btn { margin-top: 16px; width: 100%; padding: 16px; border: none; border-radius: var(--radius-m); background: linear-gradient(135deg, var(--c-accent) 0%, #ff6b1a 100%); color: #fff; font-weight: 800; font-size: 16px; letter-spacing: 4px; cursor: pointer; box-shadow: 0 8px 24px rgba(255,107,26,0.35); transition: transform .15s; font-family: var(--font); }
  .search-btn:active { transform: scale(0.98); }

  /* === Train Type Selector === */
  .traintype-row { margin-top: 14px; }
  .type-pills { display: flex; gap: 8px; }
  .type-pill {
    flex: 1; padding: 10px 6px; border-radius: var(--radius-m);
    background: var(--c-surface-2); border: 1px solid var(--c-line);
    color: var(--c-text-dim); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--font);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .2s;
  }
  .type-pill:hover { border-color: var(--c-accent); color: var(--c-text); }
  .type-pill.active { background: rgba(255,140,66,0.12); border-color: var(--c-accent); color: var(--c-accent-2); }
  .type-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .type-dot.reserved   { background: #60a5fa; }   /* 藍：對號 */
  .type-dot.unreserved { background: #a3e635; }   /* 綠：非對號 */

  /* === Favorites === */
  .favorites { margin: 18px 22px 0; }
  .section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-title h3 { font-size: 13px; letter-spacing: 3px; color: var(--c-text-dim); font-weight: 700; text-transform: uppercase; font-family: var(--mono); }
  .fav-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; -webkit-overflow-scrolling: touch; touch-action: pan-x; cursor: grab; user-select: none; }
  .fav-list::-webkit-scrollbar { display: none; }
  .fav-list.dragging { cursor: grabbing; }
  .fav-chip { flex-shrink: 0; background: var(--c-surface); border: 1px solid var(--c-line); padding: 10px 14px; border-radius: 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .2s; }
  .fav-chip:hover { border-color: var(--c-accent); }
  .fav-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
  .fav-chip.tra .dot  { background: var(--c-tra); }
  .fav-chip.thsr .dot { background: var(--c-thsr); }

  /* === Results === */
  .results { margin: 22px 22px 30px; flex: 1; }
  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .results-header h3 { font-size: 13px; letter-spacing: 3px; color: var(--c-text-dim); font-weight: 700; text-transform: uppercase; font-family: var(--mono); }
  .filter-pills { display: flex; gap: 6px; }
  .pill { font-size: 11px; padding: 5px 10px; border-radius: 10px; background: var(--c-surface); border: 1px solid var(--c-line); color: var(--c-text-dim); cursor: pointer; transition: all .2s; }
  .pill.active { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }

  .train-card { background: var(--c-surface); border: 1px solid var(--c-line); border-radius: var(--radius-m); padding: 14px 16px; margin-bottom: 10px; display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center; cursor: pointer; transition: transform .15s, border-color .2s; position: relative; overflow: hidden; }
  .train-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--c-tra); }
  .train-card[data-system="thsr"]::before { background: var(--c-thsr); }
  .train-card:hover { border-color: var(--c-accent); transform: translateY(-1px); }

  .train-no { background: var(--c-surface-2); padding: 8px 10px; border-radius: 10px; text-align: center; min-width: 64px; }
  .train-no .num  { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--c-accent-2); }
  .train-no .type { font-size: 10px; color: var(--c-text-dim); margin-top: 2px; }

  .train-time { display: flex; align-items: center; gap: 10px; }
  .time-block { text-align: center; }
  .time-block .t { font-family: var(--mono); font-size: 18px; font-weight: 700; }
  .time-block .s  { font-size: 11px; color: var(--c-text-dim); margin-top: 2px; }
  .duration { text-align: center; flex: 1; }
  .duration .line { height: 2px; background: linear-gradient(90deg, transparent, var(--c-line), transparent); margin: 6px 4px 4px; position: relative; }
  .duration .line::after { content: '→'; position: absolute; right: -2px; top: -10px; color: var(--c-text-dim); font-size: 14px; }
  .duration .min { font-family: var(--mono); font-size: 11px; color: var(--c-text-dim); }

  .train-meta { text-align: right; }
  .price  { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--c-accent); }
  .status { font-size: 10px; margin-top: 4px; padding: 2px 6px; border-radius: 6px; display: inline-block; }
  .status.ontime { background: rgba(74,222,128,0.15); color: var(--c-success); }
  .status.delay  { background: rgba(248,113,113,0.15); color: var(--c-danger); }

  .empty { text-align: center; padding: 40px 20px; color: var(--c-text-dim); font-size: 14px; line-height: 1.8; }
  .empty .icon { font-size: 40px; opacity: 0.4; margin-bottom: 12px; }

  /* === Bottom Nav === */
  .bottom-nav { position: sticky; bottom: 0; background: rgba(20,35,57,0.88); backdrop-filter: blur(20px); border-top: 1px solid var(--c-line); display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--c-text-dim); font-size: 11px; cursor: pointer; padding: 6px 0; transition: color .2s; }
  .nav-item.active { color: var(--c-accent); }
  .nav-item svg { width: 22px; height: 22px; }

  /* === Page switching === */
  .page { flex: 1; overflow-y: auto; min-height: 0; }
  .page.hidden { display: none !important; }

  /* === Add-fav button (results header) === */
  .add-fav-btn { font-size: 11px; padding: 5px 10px; border-radius: 10px; background: var(--c-surface); border: 1px solid var(--c-line); color: var(--c-text-dim); cursor: pointer; transition: all .2s; white-space: nowrap; font-family: var(--font); }
  .add-fav-btn.saved { background: rgba(255,182,97,0.15); border-color: var(--c-accent-2); color: var(--c-accent-2); }

  /* === Favorites Management Page === */
  .fav-page { margin: 18px 22px 30px; flex: 1; }
  .fav-page-header { font-size: 13px; letter-spacing: 3px; color: var(--c-text-dim); font-weight: 700; text-transform: uppercase; font-family: var(--mono); margin-bottom: 16px; }
  .fav-manage-item { display: flex; align-items: center; gap: 12px; background: var(--c-surface); border: 1px solid var(--c-line); border-radius: var(--radius-m); padding: 12px 14px; margin-bottom: 8px; }
  .fav-manage-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .fav-manage-dot.tra  { background: var(--c-tra); }
  .fav-manage-dot.thsr { background: var(--c-thsr); }
  .fav-manage-info { flex: 1; }
  .fav-manage-route { font-size: 14px; font-weight: 600; }
  .fav-manage-sys { font-size: 10px; color: var(--c-text-dim); font-family: var(--mono); margin-top: 3px; letter-spacing: 1px; }
  .fav-delete-btn { width: 32px; height: 32px; border: none; background: rgba(248,113,113,0.12); color: var(--c-danger); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .2s; }
  .fav-delete-btn:hover { background: rgba(248,113,113,0.25); }
  .fav-add-from-search { display: flex; align-items: center; gap: 10px; background: rgba(255,140,66,0.06); border: 1px dashed rgba(255,140,66,0.4); border-radius: var(--radius-m); padding: 12px 14px; margin-top: 4px; cursor: pointer; transition: all .2s; }
  .fav-add-from-search:hover { background: rgba(255,140,66,0.12); border-color: var(--c-accent); }
  .fav-add-from-search .label { flex: 1; font-size: 14px; color: var(--c-text-dim); }
  .fav-add-from-search .plus { font-size: 20px; color: var(--c-accent); line-height: 1; }
  .fav-empty { text-align: center; padding: 40px 20px; color: var(--c-text-dim); font-size: 14px; line-height: 1.8; }
  .drag-handle { font-size: 17px; color: var(--c-text-dim); cursor: grab; padding: 0 8px 0 0; touch-action: none; user-select: none; line-height: 1; flex-shrink: 0; }
  .drag-handle:active { cursor: grabbing; }
  .fav-manage-item.is-dragging { opacity: 0.55; border-color: var(--c-accent); box-shadow: 0 6px 20px rgba(0,0,0,0.25); transform: scale(1.01); }

  /* =============================================
     Station Picker Modal
     ============================================= */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal-backdrop.show { display: flex; }
  .modal { width: 100%; max-width: 480px; background: var(--c-surface); border-radius: 24px 24px 0 0; max-height: 88vh; display: flex; flex-direction: column; animation: slideUp .3s cubic-bezier(.2,.8,.2,1); overflow: hidden; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-header { padding: 16px 20px 0; flex-shrink: 0; }
  .modal-handle { width: 40px; height: 4px; background: var(--c-line); border-radius: 2px; margin: 0 auto 14px; }
  .modal-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .modal-title-row h2 { font-size: 18px; }
  .system-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
  .system-badge.tra  { background: rgba(31,111,178,0.2); color: var(--c-tra); border: 1px solid rgba(31,111,178,0.4); }
  .system-badge.thsr { background: rgba(232,160,32,0.2); color: var(--c-thsr); border: 1px solid rgba(232,160,32,0.4); }

  .quick-search-wrap { padding: 0 20px 10px; flex-shrink: 0; }
  .quick-search { width: 100%; background: var(--c-surface-2); border: 1px solid var(--c-line); padding: 11px 14px; border-radius: 12px; color: var(--c-text); font-size: 14px; outline: none; font-family: var(--font); transition: border-color .2s; }
  .quick-search:focus { border-color: var(--c-accent); }
  .quick-search::placeholder { color: var(--c-text-dim); }

  /* Two-panel layout for TRA */
  .picker-body { display: flex; flex: 1; overflow: hidden; }

  .county-panel { width: 115px; flex-shrink: 0; overflow-y: auto; border-right: 1px solid var(--c-line); scrollbar-width: none; background: rgba(14,26,43,0.4); }
  .county-panel::-webkit-scrollbar { display: none; }
  .county-item { padding: 13px 10px 13px 14px; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; color: var(--c-text-dim); line-height: 1.3; transition: background .15s, color .15s; }
  .county-item:hover { background: var(--c-surface-2); color: var(--c-text); }
  .county-item.active { background: var(--c-surface-2); color: var(--c-text); font-weight: 700; border-left-color: var(--c-tra); }

  .station-panel { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--c-line) transparent; }
  .station-panel::-webkit-scrollbar { width: 4px; }
  .station-panel::-webkit-scrollbar-thumb { background: var(--c-line); border-radius: 2px; }

  .flat-list { flex: 1; overflow-y: auto; }

  .station-item { padding: 14px 18px; cursor: pointer; border-bottom: 1px solid rgba(35,58,94,0.5); transition: background .15s; display: flex; flex-direction: column; gap: 2px; }
  .station-item:hover { background: var(--c-surface-2); }
  .station-item .sname { font-size: 15px; font-weight: 500; }
  .station-item .smeta { font-size: 11px; color: var(--c-text-dim); font-family: var(--mono); }

  /* THSR station item: show city badge */
  .thsr-item { padding: 14px 18px; cursor: pointer; border-bottom: 1px solid rgba(35,58,94,0.5); transition: background .15s; display: flex; align-items: center; gap: 14px; }
  .thsr-item:hover { background: var(--c-surface-2); }
  .thsr-seq { font-family: var(--mono); font-size: 12px; color: var(--c-text-dim); width: 18px; text-align: right; }
  .thsr-info .sname { font-size: 15px; font-weight: 600; }
  .thsr-info .smeta { font-size: 11px; color: var(--c-text-dim); font-family: var(--mono); margin-top: 2px; }
  .thsr-arrow { margin-left: auto; color: var(--c-text-dim); font-size: 18px; }

  /* === Detail Card === */
  .detail-card { background: var(--c-surface); border: 1px solid var(--c-line); border-radius: var(--radius-m); padding: 18px; margin-top: 12px; display: none; }
  .detail-card.show { display: block; animation: fadeUp .25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .stops { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .stop { display: grid; grid-template-columns: 60px 20px 1fr; gap: 10px; align-items: center; }
  .stop .t { font-family: var(--mono); font-size: 13px; color: var(--c-text-dim); }
  .stop .marker { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--c-accent); margin: 0 auto; position: relative; }
  .stop:not(:last-child) .marker::after { content: ''; position: absolute; left: 50%; top: 100%; width: 2px; height: 18px; background: var(--c-line); transform: translateX(-50%); }
  .stop .sname { font-size: 14px; }
  .stop.endpoint .marker { background: var(--c-accent); }

  /* === Toast === */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--c-surface-3); border: 1px solid var(--c-line); padding: 12px 20px; border-radius: 12px; font-size: 13px; z-index: 200; box-shadow: var(--shadow-2); transition: transform .35s cubic-bezier(.2,.9,.3,1.4); white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* === 淺色主題 === */
  body.light {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,140,66,0.04), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(31,111,178,0.06), transparent 60%),
      #F2F5F9;
    --c-bg:        #F2F5F9;
    --c-surface:   #FFFFFF;
    --c-surface-2: #EDF1F7;
    --c-surface-3: #E3E9F2;
    --c-line:      #CCDAE8;
    --c-text:      #1A2840;
    --c-text-dim:  #5A7090;
    --shadow-1: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-2: 0 12px 40px rgba(0,0,0,0.10);
  }
  body.light .app { background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(242,245,249,0.98) 100%); }
  body.light .bottom-nav { background: rgba(255,255,255,0.92); }
  body.light .dt-cell input { color: var(--c-text); }

  /* === 「現在」按鈕 === */
  .datetime-row { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; }
  .now-btn { flex-shrink: 0; background: var(--c-surface-2); border: 1px solid var(--c-line); border-radius: var(--radius-m); padding: 0 14px; color: var(--c-accent); font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--mono); transition: all .2s; white-space: nowrap; min-height: 62px; }
  .now-btn:hover { border-color: var(--c-accent); background: rgba(255,140,66,0.06); }
  .now-btn:active { transform: scale(0.96); }

  /* === 最近查詢頁 === */
  .history-page { margin: 18px 22px 30px; }

   TDX API 設定區
   填入 Cloudflare Worker 部署後的網址即可串接真實資料
   範例：https://tdx-proxy.your-name.workers.dev
   ====================================================== */
const TDX_CONFIG = {
  PROXY_URL: 'https://tdx-proxy.marspaul-li.workers.dev',
};

// 站 ID 動態從 TDX 取得，這裡只是備用 fallback（啟動時會被覆蓋）
let TRA_STATION_ID  = {};
let THSR_STATION_ID = {};

// 台鐵車種 → 對號/非對號分類
// TrainTypeName 對號：自強、普悠瑪、太魯閣、莒光、復興
// TrainTypeName 非對號：區間、區間快
const RESERVED_TYPES   = ['自強','普悠瑪','太魯閣','莒光','復興'];
const UNRESERVED_TYPES = ['區間','區間快'];

// 站名統一：臺→台，方便與 TDX 回傳名稱對齊
const normName = s => s.replace(/臺/g, '台');

// 站牌 ID 快取：localStorage 存 7 天，避免頻繁打 API
const STATIONS_CACHE_KEY = 'dual_rail_stations_v1';
const STATIONS_TTL_MS    = 7 * 24 * 60 * 60 * 1000; // 7 天

function loadStationsFromCache() {
  try {
    const raw = localStorage.getItem(STATIONS_CACHE_KEY);
    if (!raw) return false;
    const { ts, tra, thsr } = JSON.parse(raw);
    if (Date.now() - ts > STATIONS_TTL_MS) return false;
    TRA_STATION_ID  = tra;
    THSR_STATION_ID = thsr;
    return true;
  } catch { return false; }
}

function saveStationsToCache() {
  try {
    localStorage.setItem(STATIONS_CACHE_KEY, JSON.stringify({
      ts:   Date.now(),
      tra:  TRA_STATION_ID,
      thsr: THSR_STATION_ID,
    }));
  } catch {}
}

let _stationsReady = Promise.resolve();

function fetchStations() {
  return (async () => {
    removeStationErrorBanner();
    try {
      const [traRes, thsrRes] = await Promise.all([
        fetch(`${TDX_CONFIG.PROXY_URL}/stations/tra`),
        fetch(`${TDX_CONFIG.PROXY_URL}/stations/thsr`),
      ]);
      const traData  = await traRes.json();
      const thsrData = await thsrRes.json();
      if (traData.error)  throw new Error(traData.error);
      if (thsrData.error) throw new Error(thsrData.error);
      TRA_STATION_ID  = traData;
      THSR_STATION_ID = thsrData;
      saveStationsToCache();
    } catch (e) {
      console.error('[Stations load failed]', e);
      showStationErrorBanner(e.message);
    }
  })();
}

function showStationErrorBanner(msg) {
  removeStationErrorBanner();
  const el = document.createElement('div');
  el.id = 'station-error-banner';
  el.style.cssText = `margin:0 22px 0;padding:10px 14px;border-radius:12px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.3);font-size:12px;color:#F87171;line-height:1.6;display:flex;align-items:center;justify-content:space-between;gap:10px;`;
  el.innerHTML = `<span>⚠️ 站牌資料載入失敗<br><small style="opacity:.7;font-family:var(--mono)">${msg}</small></span>
    <button id="retry-stations-btn" style="flex-shrink:0;padding:6px 12px;border:1px solid rgba(248,113,113,0.4);border-radius:8px;background:transparent;color:#F87171;font-size:12px;cursor:pointer;">重試</button>`;
  const searchCard = document.querySelector('.search-card');
  searchCard.insertAdjacentElement('afterend', el);
  document.getElementById('retry-stations-btn').addEventListener('click', () => {
    _stationsReady = fetchStations();
  });
}

function removeStationErrorBanner() {
  document.getElementById('station-error-banner')?.remove();
}

if (TDX_CONFIG.PROXY_URL) {
  if (loadStationsFromCache()) {
    console.log('[Stations] 從快取載入，TRA:', Object.keys(TRA_STATION_ID).length);
  } else {
    _stationsReady = fetchStations();
  }
}

/* ─── Render TRA two-panel ─── */
function renderTra(keyword) {
  const body = $('#picker-body');
  keyword = (keyword || '').trim();

  if (keyword) {
    // Flat search results
    const hits = [];
    TRA.forEach(g => g.stations.filter(s => s.zh.includes(keyword) || s.en.toLowerCase().includes(keyword.toLowerCase())).forEach(s => hits.push({county: g.county, ...s})));
    body.innerHTML = `<div class="flat-list">${
      hits.length
        ? hits.map(s => `<div class="station-item" data-county="${s.county}" data-name="${s.zh}">
            <span class="sname">${s.county} / ${s.zh}</span>
            <span class="smeta">${s.en}</span>
          </div>`).join('')
        : '<div class="empty" style="padding:30px 0">查無車站</div>'
    }</div>`;
    body.querySelectorAll('.station-item').forEach(el =>
      el.addEventListener('click', () => pickTra(el.dataset.county, el.dataset.name))
    );
    return;
  }

  // Two-panel
  const counties = TRA.map(g => `
    <div class="county-item ${g.county === S.activeCounty ? 'active' : ''}" data-county="${g.county}">
      ${g.county}
    </div>`).join('');

  const group = TRA.find(g => g.county === S.activeCounty);
  const stationItems = (group?.stations || []).map(s => `
    <div class="station-item" data-county="${S.activeCounty}" data-name="${s.zh}">
      <span class="sname">${s.zh}</span>
      <span class="smeta">${s.en}</span>
    </div>`).join('');

  body.innerHTML = `
    <div class="county-panel">${counties}</div>
    <div class="station-panel">${stationItems}</div>`;

  // County click
  body.querySelectorAll('.county-item').forEach(el =>
    el.addEventListener('click', () => { S.activeCounty = el.dataset.county; renderTra(); })
  );
  // Station click
  body.querySelectorAll('.station-item').forEach(el =>
    el.addEventListener('click', () => pickTra(el.dataset.county, el.dataset.name))
  );
  // Auto-scroll active county
  const active = body.querySelector('.county-item.active');
  if (active) setTimeout(() => active.scrollIntoView({ block: 'nearest' }), 0);
}

function pickTra(county, name) {
  const g = TRA.find(x => x.county === county);
  const s = g?.stations.find(x => x.zh === name);
  if (!s) return;
  const obj = { county, zh: s.zh, en: s.en };
  S[S.pickerTarget] = obj;
  setBtn(S.pickerTarget, obj);
  closePicker();
}

          <div class="smeta">${s.city} · ${s.note}</div>

        <span class="thsr-arrow">›</span>
      </div>`).join('')
    || '<div class="empty" style="padding:30px 0">查無車站</div>'
  }</div>`;

  body.querySelectorAll('.thsr-item').forEach(el =>
    el.addEventListener('click', () => {

    })
  );
}

const FAV_KEY = 'dual_rail_favs_v1';
const FAV_DEFAULTS = [

];
let FAVS = [];

function loadFavs() {

function saveFavs() {

}
function isFaved() {
  if (!S.from || !S.to) return false;

function addFav() {

}
function deleteFav(idx) {

function renderFavChips() {
  const list = $('.fav-list');
  list.innerHTML = FAVS.map((f, i) => {
    const suffix = f.sys === 'thsr' ? '（高鐵）' : '';
    return `<div class="fav-chip ${f.sys}" data-fav-idx="${i}"><span class="dot"></span>${f.from.zh} → ${f.to.zh}${suffix}</div>`;
  }).join('');

function clickFav(idx) {

  if (!f) return;
  $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === f.sys));
  S.system = f.sys;

  setBtn('from', S.from);
  setBtn('to', S.to);
  showPage('home');
  doSearch();
}
function renderFavManage() {
  const list = $('#fav-manage-list');
  const hint = $('#fav-add-hint');
  if (FAVS.length === 0) {
    list.innerHTML = '<div class="fav-empty">尚無常用路線<br><small>查詢後點「加入常用」即可儲存</small></div>';
  } else {
    list.innerHTML = FAVS.map((f, i) => `
      <div class="fav-manage-item" data-fav-idx="${i}">
        <div class="drag-handle" title="拖曳排序">⠿</div>
        <div class="fav-manage-dot ${f.sys}"></div>
        <div class="fav-manage-info">
          <div class="fav-manage-route">${f.from.zh} → ${f.to.zh}</div>
          <div class="fav-manage-sys">${f.sys === 'thsr' ? '高鐵 THSR' : '台鐵 TRA'}</div>
        </div>
        <button class="fav-delete-btn" data-del-idx="${i}" aria-label="刪除">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>`).join('');
    $$('.fav-delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteFav(+btn.dataset.delIdx));
    });
    initFavDrag();
  }
  if (hint) {
    const canAdd = S.from && S.to && !isFaved();
    hint.style.display = canAdd ? '' : 'none';
    if (canAdd) {
      const sysLabel = S.system === 'thsr' ? '高鐵' : '台鐵';
      $('#fav-add-label').textContent = `加入「${S.from.zh} → ${S.to.zh}」（${sysLabel}）`;
    }
  }
}
function initFavDrag() {
  const list = $('#fav-manage-list');
  if (!list) return;
  let dragging = null;

  list.addEventListener('pointerdown', e => {
    if (!e.target.closest('.drag-handle')) return;
    e.preventDefault();
    dragging = e.target.closest('.fav-manage-item');
    dragging.classList.add('is-dragging');
    list.setPointerCapture(e.pointerId);
  }, { passive: false });

  list.addEventListener('pointermove', e => {
    if (!dragging) return;
    const siblings = [...list.querySelectorAll('.fav-manage-item')].filter(el => el !== dragging);
    for (const el of siblings) {
      const { top, height } = el.getBoundingClientRect();
      if (e.clientY < top + height / 2) { el.before(dragging); return; }
    }
    list.append(dragging);
  });

  const endDrag = () => {
    if (!dragging) return;
    dragging.classList.remove('is-dragging');
    const newOrder = [...list.querySelectorAll('.fav-manage-item')].map(el => +el.dataset.favIdx);
    FAVS = newOrder.map(i => FAVS[i]);
    saveFavs();
    renderFavChips();
    renderFavManage();
    dragging = null;
  };
  list.addEventListener('pointerup', endDrag);
  list.addEventListener('pointercancel', endDrag);
}

}

const HISTORY_KEY = 'dual_rail_history_v1';
const HISTORY_MAX = 10;
let HISTORY = [];

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (raw) HISTORY = JSON.parse(raw);
  } catch {}
}
function saveHistory() {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(HISTORY)); } catch {}
}
function addHistory() {
  if (!S.from || !S.to) return;
  const entry = {
    sys: S.system, from: {...S.from}, to: {...S.to},
    date: $('#date-input').value, time: $('#time-input').value,
    ts: Date.now(),
  };
  // 同路線已有記錄就先移除，再插到最前面
  HISTORY = HISTORY.filter(h => !(h.sys === entry.sys && h.from.zh === entry.from.zh && h.to.zh === entry.to.zh));
  HISTORY.unshift(entry);
  if (HISTORY.length > HISTORY_MAX) HISTORY.length = HISTORY_MAX;
  saveHistory();
}
function renderHistory() {
  const list = $('#history-list');
  if (!HISTORY.length) {
    list.innerHTML = '<div class="fav-empty">尚無查詢記錄<br><small>查詢後自動儲存最近 10 筆</small></div>';
    return;
  }
  list.innerHTML = HISTORY.map((h, i) => {
    const sysLabel = h.sys === 'thsr' ? '高鐵' : '台鐵';
    const dateStr  = h.date ? h.date.slice(5).replace('-','/') : '';
    return `<div class="history-item" data-hist-idx="${i}">
      <div class="history-dot ${h.sys}"></div>
      <div class="history-info">
        <div class="history-route">${h.from.zh} → ${h.to.zh}</div>
        <div class="history-meta">${sysLabel} · ${dateStr} ${h.time}</div>
      </div>
      <div class="history-go">›</div>
    </div>`;
  }).join('');
  $$('.history-item').forEach(item => {
    item.addEventListener('click', () => {
      const h = HISTORY[+item.dataset.histIdx];
      if (!h) return;
      $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === h.sys));
      S.system = h.sys; S.from = {...h.from}; S.to = {...h.to};
      $('#traintype-row').style.display = h.sys === 'tra' ? '' : 'none';
      setBtn('from', S.from); setBtn('to', S.to);
      $('#date-input').value = h.date;
      $('#time-input').value = h.time;
      showPage('home');
      doSearch();
    });
  });
}

    el.scrollLeft = scrollLeft - (e.pageX - el.offsetLeft - startX) * 1.5;
  });
  const stop = () => { down = false; el.classList.remove('dragging'); };
  el.addEventListener('mouseup', stop);
  el.addEventListener('mouseleave', stop);
}

/* ─── Search ─── */
$('#search-btn').addEventListener('click', doSearch);

async function doSearch() {
  if (!S.from || !S.to) { showToast('請選擇起訖站'); return; }
  if (S.from.zh === S.to.zh) { showToast('起訖站不能相同'); return; }

  const dateVal = $('#date-input').value;
  const timeVal = $('#time-input').value;

  // ── 判斷是否有設定 proxy ──
  if (TDX_CONFIG.PROXY_URL) {
    await fetchFromTDX(dateVal, timeVal);
  } else {
    // 沒有 API 金鑰 → 顯示示範資料（假資料）
    showApiHint();
    const base = new Date(`${dateVal}T${timeVal}`);
    renderResults(makeDemoTrains(S.system, S.from.zh, S.to.zh, base));
  }
  $('#detail-card').classList.remove('show');
}

/* ── TDX 真實 API 呼叫（透過 Cloudflare Worker proxy） ── */
async function fetchFromTDX(dateVal, timeVal) {
  const list = $('#results-list');
  list.innerHTML = '<div class="empty"><div class="icon" style="font-size:28px">⏳</div><br>查詢中…</div>';
  await _stationsReady;

  try {
    let trains;
    if (S.system === 'thsr') {
      trains = await fetchThsr(dateVal, timeVal);
    } else {
      trains = await fetchTra(dateVal, timeVal);
    }

    if (!trains.length) {
      list.innerHTML = '<div class="empty"><div class="icon">😢</div>查無班次</div>';
      return;
    }
    renderResults(trains);
    addHistory();

  } catch (err) {
    console.error(err);
    list.innerHTML = `<div class="empty"><div class="icon">⚠️</div>API 呼叫失敗<br><small style="font-family:var(--mono);font-size:11px;opacity:.6">${err.message}</small></div>`;
  }
}

async function fetchTra(dateVal, timeVal) {
  const fromId = TRA_STATION_ID[normName(S.from.zh)];
  const toId   = TRA_STATION_ID[normName(S.to.zh)];
  if (!fromId || !toId) throw new Error(`查無站代碼：${S.from.zh} / ${S.to.zh}（站牌資料是否已載入？）`);

  // 時刻表 + 票價同時查
  const [ttRes, fareRes] = await Promise.all([
    fetch(`${TDX_CONFIG.PROXY_URL}/tra/${fromId}/${toId}/${dateVal}`),
    fetch(`${TDX_CONFIG.PROXY_URL}/tra-fare/${fromId}/${toId}`),
  ]);
  const json     = await ttRes.json();
  const fareJson = await fareRes.json();
  if (json.error) throw new Error(json.error);

  // 建立票價對照表：`${direction}_${trainType}` → 成人全票價
  const fareMap = {};
  const fareList = Array.isArray(fareJson) ? fareJson : (fareJson.ODFares || fareJson.Fares || []);
  for (const entry of fareList) {
    const key = `${entry.Direction}_${entry.TrainType}`;
    const adult = entry.Fares?.find(f => f.TicketType === 1 && f.FareClass === 1);
    if (adult) fareMap[key] = adult.Price;
  }

  const timetables = json.TrainTimetables || [];
  const [filterH, filterM] = timeVal.split(':').map(Number);
  const filterMin = filterH * 60 + filterM;

  return timetables.map(tt => {
    const info  = tt.TrainInfo;
    const stops = tt.StopTimes;
    const fromStop = stops.find(s => s.StationID === fromId);
    const toStop   = stops.find(s => s.StationID === toId);
    if (!fromStop || !toStop) return null;

    const dep = fromStop.DepartureTime || fromStop.ArrivalTime;
    const arr = toStop.ArrivalTime     || toStop.DepartureTime;
    const [dh, dm] = dep.split(':').map(Number);
    const [ah, am] = arr.split(':').map(Number);
    const dur = (ah * 60 + am) - (dh * 60 + dm);
    const typeName = info.TrainTypeName?.Zh_tw || info.TrainTypeName || '';
    const fareKey  = `${info.Direction}_${info.TrainTypeCode}`;

    return {
      no:   info.TrainNo,
      type: typeName,
      sys:  'tra',
      dep, arr,
      dur:  dur > 0 ? dur : dur + 1440,
      depMin: dh * 60 + dm,
      price: fareMap[fareKey] ?? null,
      from: S.from.zh, to: S.to.zh,
      late: false, lateMin: 0,
      reserved: RESERVED_TYPES.some(t => typeName.includes(t)),
    };
  }).filter(t => t && t.depMin >= filterMin)
    .sort((a, b) => a.depMin - b.depMin);
}

async function fetchThsr(dateVal, timeVal) {
  const fromId = THSR_STATION_ID[normName(S.from.zh)];
  const toId   = THSR_STATION_ID[normName(S.to.zh)];
  if (!fromId || !toId) throw new Error(`查無站代碼：${S.from.zh} / ${S.to.zh}（站牌資料是否已載入？）`);

  // 時刻表 + 票價同時查
  const [ttRes, fareRes] = await Promise.all([
    fetch(`${TDX_CONFIG.PROXY_URL}/thsr/${fromId}/${toId}/${dateVal}`),
    fetch(`${TDX_CONFIG.PROXY_URL}/thsr-fare/${fromId}/${toId}`),
  ]);
  const json     = await ttRes.json();
  const fareJson = await fareRes.json();
  if (json.error) throw new Error(json.error);

  // THSR 票價：取標準對號座（CabinClass=2, FareClass=1）Direction=0
  const fareList = Array.isArray(fareJson) ? fareJson : [];
  const fareEntry = fareList.find(f => f.Direction === 0) || fareList[0];
  const thsrPrice = fareEntry?.Fares?.find(f => f.CabinClass === 2 && f.FareClass === 1)?.Price
                 ?? fareEntry?.Fares?.find(f => f.TicketType === 1 && f.FareClass === 1)?.Price
                 ?? null;

  // v2 回傳格式：直接是陣列（非 {ODTimetables:[...]}）
  const timetables = Array.isArray(json) ? json : (json.ODTimetables || []);
  const [filterH, filterM] = timeVal.split(':').map(Number);
  const filterMin = filterH * 60 + filterM;

  return timetables.map(tt => {
    const dep = tt.OriginStopTime?.DepartureTime;
    const arr = tt.DestinationStopTime?.ArrivalTime;
    if (!dep || !arr) return null;

    const [dh, dm] = dep.split(':').map(Number);
    const [ah, am] = arr.split(':').map(Number);
    const dur = (ah * 60 + am) - (dh * 60 + dm);

    return {
      no:   tt.DailyTrainInfo?.TrainNo || '—',
      type: '高鐵',
      sys:  'thsr',
      dep, arr,
      dur:  dur > 0 ? dur : dur + 1440,
      depMin: dh * 60 + dm,
      price: thsrPrice,
      from: S.from.zh, to: S.to.zh,
      late: false, lateMin: 0,
      reserved: true,
    };
  }).filter(t => t && t.depMin >= filterMin)
    .sort((a, b) => a.depMin - b.depMin);
}

/* ── 無 API 金鑰時顯示提示橫幅 ── */
function showApiHint() {
  if ($('#api-hint')) return;
  const banner = document.createElement('div');
  banner.id = 'api-hint';
  banner.style.cssText = `
    margin: 0 22px 12px; padding: 10px 14px; border-radius: 12px;
    background: rgba(255,180,0,0.08); border: 1px solid rgba(255,180,0,0.3);
    font-size: 12px; color: #FFB661; line-height: 1.5;
  `;
  banner.innerHTML = `⚠️ 目前顯示<b>示範資料</b>，非真實班次。<br>填入 TDX API 金鑰後即可查詢真實資料。`;
  $('#results-list').before(banner);
}

/* ── 示範資料產生器（開發用，模擬 TDX 資料格式） ── */
const DEMO_RESERVED   = ['自強','普悠瑪','太魯閣','莒光'];
const DEMO_UNRESERVED = ['區間','區間快'];
const DEMO_ALL = [...DEMO_RESERVED, ...DEMO_UNRESERVED];

function makeDemoTrains(sys, from, to, base) {
  const dur0 = sys === 'thsr' ? ri(25,95) : ri(45,190);
  return Array.from({length: 10}, (_, i) => {
    const offset = i * ri(10, 28);
    const dep = new Date(base.getTime() + offset * 60000);
    const dur = dur0 + ri(-5, 8);
    const arr = new Date(dep.getTime() + dur * 60000);
    if (sys === 'thsr') {
      return { no:'0'+ri(801,897), type:'商務/標準', sys, dep:fmt(dep), arr:fmt(arr), dur, price:ri(190,1490), from, to, late:Math.random()>.87, lateMin:ri(2,12), reserved:true };
    }
    // 台鐵：隨機混合對號與非對號
    const isReserved = Math.random() > 0.4;
    const pool = isReserved ? DEMO_RESERVED : DEMO_UNRESERVED;
    const type = pool[ri(0, pool.length-1)];
    return { no:ri(100,4500), type, sys, dep:fmt(dep), arr:fmt(arr), dur, price:ri(80,850), from, to, late:Math.random()>.87, lateMin:ri(2,12), reserved:isReserved };
  });
}

/* ─── Render results ─── */
function renderResults(trains) {
  const list = $('#results-list');
  $('#results-title').textContent = `${S.from.zh} → ${S.to.zh}`;

  let data = trains;

  // 車種篩選（台鐵）
  if (S.system === 'tra' && S.trainType !== 'all') {
    data = data.filter(t => S.trainType === 'reserved' ? t.reserved : !t.reserved);
  }
  // 直達篩選
  if (S.filter === 'fast') {
    const avg = data.reduce((s,t) => s+t.dur, 0) / (data.length || 1);
    data = data.filter(t => t.dur <= avg);
  }

  window._T = data;

  if (!data.length) {
    list.innerHTML = '<div class="empty"><div class="icon">😢</div>查無符合條件的班次</div>';
    return;
  }

  list.innerHTML = data.map((t, i) => {
    const isReserved = t.reserved;
    const tagColor = t.sys === 'thsr' ? 'var(--c-thsr)'
                   : isReserved ? '#60a5fa' : '#a3e635';
    const priceText = t.price != null ? `$${t.price}` : '—';
    return `
    <div class="train-card" data-system="${t.sys}" data-idx="${i}">
      <div class="train-no">
        <div class="num" style="color:${tagColor}">${t.no}</div>
        <div class="type">${t.type}</div>
      </div>
      <div class="train-time">
        <div class="time-block"><div class="t">${t.dep}</div><div class="s">${t.from}</div></div>
        <div class="duration"><div class="line"></div><div class="min">${t.dur} 分</div></div>
        <div class="time-block"><div class="t">${t.arr}</div><div class="s">${t.to}</div></div>
      </div>
      <div class="train-meta">
        <div class="price">${priceText}</div>
        <div class="status ${t.late ? 'delay' : 'ontime'}">${t.late ? '誤點 '+t.lateMin+'′' : '準點'}</div>
      </div>
    </div>`;
  }).join('');

  $$('.train-card').forEach(c => c.addEventListener('click', () => showDetail(+c.dataset.idx, c)));
  updateAddFavBtn();
}

/* ─── Detail stops（inline，插在點擊的班次後面） ─── */
function showDetail(idx, cardEl) {
  // 若點同一張卡 → 收合
  const wasOpen = cardEl.dataset.open === '1';
  $$('.detail-inline').forEach(el => el.remove());
  $$('.train-card').forEach(c => delete c.dataset.open);
  if (wasOpen) return;

  const t = window._T?.[idx]; if (!t) return;

  const allZ = t.sys === 'thsr'
    ? THSR.map(s => s.zh)
    : TRA.flatMap(g => g.stations.map(s => s.zh));
  const fi = allZ.indexOf(t.from), ti = allZ.indexOf(t.to);
  const step = fi < ti ? 1 : -1;
  const stops = [];
  for (let i = fi; i !== ti + step; i += step) stops.push(allZ[i]);
  const perStop = t.dur / Math.max(stops.length - 1, 1);
  const base = new Date(`${$('#date-input').value}T${t.dep}`);
  const priceText = t.price != null ? `$${t.price}` : '—';

  const detail = document.createElement('div');
  detail.className = 'detail-card detail-inline show';
  detail.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span>
        <span style="font-family:var(--mono);font-size:17px;color:var(--c-accent-2)">${t.no}</span>
        <span style="font-size:12px;color:var(--c-text-dim);margin-left:8px">${t.type} · ${t.dur} 分鐘</span>
      </span>
      <span style="font-family:var(--mono);font-size:17px;color:var(--c-accent)">${priceText}</span>
    </div>
    <div class="stops">${stops.map((nm, i) => {
      const time = new Date(base.getTime() + i * perStop * 60000);
      const ep = i === 0 || i === stops.length - 1;
      return `<div class="stop ${ep ? 'endpoint' : ''}"><div class="t">${fmt(time)}</div><div class="marker"></div><div class="sname">${nm}</div></div>`;
    }).join('')}</div>`;

  cardEl.dataset.open = '1';
  cardEl.insertAdjacentElement('afterend', detail);
  setTimeout(() => detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

/* ─── Train Type pills（首頁） ─── */
$$('#traintype-row .type-pill').forEach(p => p.addEventListener('click', () => {
  const type = p.dataset.type;
  applyTraType(type);
  SETTINGS.traType = type;
  saveSettings();
  if (window._T) doSearch();
}));

/* ─── Filter pills ─── */
$$('.pill').forEach(p => p.addEventListener('click', () => {
  $$('.pill').forEach(x => x.classList.remove('active'));
  p.classList.add('active');
  S.filter = p.dataset.filter;
  if (window._T) doSearch();
}));

/* ─── Toast ─── */
function showToast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 2300);
}
